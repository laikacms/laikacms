name = "laikacms-starter-cloudflare-pages"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./public"

# Bind the R2 bucket the Functions read/write content from.
# Local dev: wrangler creates a simulated R2 bucket at .wrangler/state/v3/r2.
# Production: `wrangler r2 bucket create laikacms-pages-content` first.
[[r2_buckets]]
binding = "CONTENT"
bucket_name = "laikacms-pages-content"
preview_bucket_name = "laikacms-pages-content-preview"
