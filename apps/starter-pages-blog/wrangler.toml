name = "starter-pages-blog"
pages_build_output_dir = "public"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ── R2 bucket ────────────────────────────────────────────────────────────────
# Create with: wrangler r2 bucket create starter-pages-blog-content
# Then update bucket_name below.
#
# Unlike the Workers + D1 starter, R2 is accessed via a native Workers binding —
# no API token or account ID secret is required.  Just bind the bucket and go.
[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "starter-pages-blog-content"

# ── Optional vars ─────────────────────────────────────────────────────────────
# [vars]
# DEV_TOKEN = "dev-local-laika-token"
