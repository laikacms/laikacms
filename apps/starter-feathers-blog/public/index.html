<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 48rem; margin: 2rem auto; padding: 0 1rem; }
      a { color: #0070f3; text-decoration: none; cursor: pointer; }
      a:hover { text-decoration: underline; }
      nav { margin-bottom: 2rem; }
      nav a { margin-right: 1rem; }
      time { color: #666; font-size: 0.875rem; }
      #content { min-height: 4rem; }
      .loading { color: #666; }
      .post-list { list-style: none; padding: 0; }
      .post-list li { margin-bottom: 1.5rem; }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" id="nav-home">Home</a>
      <a href="/admin/">Admin</a>
    </nav>
    <div id="content"><p class="loading">Loading…</p></div>

    <script type="module">
      /**
       * Client-side blog frontend backed by the Feathers REST API.
       *
       * GET /posts       → PostsService.find()  → list of posts (JSON)
       * GET /posts/:id   → PostsService.get(id) → single post with body (JSON)
       *
       * This is the "headless CMS + SPA" pattern: the server is a pure JSON API
       * (Feathers + LaikaCMS), the browser fetches and renders content dynamically.
       */

      const contentEl = document.getElementById('content');

      function slugFromHash() {
        const hash = location.hash.slice(1); // '#post/my-slug' → 'post/my-slug'
        if (hash.startsWith('post/')) return hash.slice('post/'.length);
        return null;
      }

      async function renderBlog() {
        const slug = slugFromHash();
        if (slug) {
          await renderPost(slug);
        } else {
          await renderList();
        }
      }

      async function renderList() {
        contentEl.innerHTML = '<p class="loading">Loading posts…</p>';
        try {
          const res = await fetch('/posts');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const posts = await res.json();
          if (posts.length === 0) {
            contentEl.innerHTML = '<h1>My Blog</h1><p>No posts yet. <a href="/admin/">Open the CMS</a> to write your first post.</p>';
            return;
          }
          const items = posts.map(p =>
            `<li><a href="#post/${p.id}">${p.title ?? p.id}</a>${p.updatedAt ? ` &middot; <time>${new Date(p.updatedAt).toLocaleDateString()}</time>` : ''}</li>`
          ).join('');
          contentEl.innerHTML = `<h1>My Blog</h1><ul class="post-list">${items}</ul>`;
        } catch (err) {
          contentEl.innerHTML = `<p>Error loading posts: ${err.message}</p>`;
        }
      }

      async function renderPost(slug) {
        contentEl.innerHTML = '<p class="loading">Loading post…</p>';
        try {
          const res = await fetch(`/posts/${encodeURIComponent(slug)}`);
          if (res.status === 404) {
            contentEl.innerHTML = '<h1>404 — Not Found</h1><p><a href="#" id="back">← Back</a></p>';
            document.getElementById('back').onclick = (e) => { e.preventDefault(); history.pushState(null,'','/'); renderList(); };
            return;
          }
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const post = await res.json();
          contentEl.innerHTML = `
            <article>
              <h1>${post.title ?? slug}</h1>
              ${post.date ? `<time>${new Date(post.date).toLocaleDateString()}</time>` : ''}
              ${post.description ? `<p><em>${post.description}</em></p>` : ''}
              <pre style="white-space:pre-wrap;font-family:inherit">${post.body ?? ''}</pre>
            </article>
            <p><a href="#" id="back">← Back</a></p>`;
          document.getElementById('back').onclick = (e) => { e.preventDefault(); location.hash = ''; renderList(); };
        } catch (err) {
          contentEl.innerHTML = `<p>Error: ${err.message}</p>`;
        }
      }

      window.addEventListener('hashchange', renderBlog);
      renderBlog();
    </script>
  </body>
</html>
