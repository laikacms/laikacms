backend:
  name: laika
  api_url: /api/decap
media_folder: public/uploads
public_folder: /uploads
collections:
  - name: posts
    label: Blog Posts
    folder: posts
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Description
        name: description
        widget: string
        required: false
      - label: Body
        name: body
        widget: markdown
