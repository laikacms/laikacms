<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- Must be set before the CDN script loads Decap -->
    <script>window.CMS_MANUAL_INIT = true;</script>
  </head>
  <body>
    <!-- Decap CMS UI from CDN — synchronously sets window.CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!--
      Pre-built by esbuild (pnpm build:admin):
        admin-client.ts → public/admin/bundle.js

      Ordering guarantee: the CDN <script> above is parser-blocking (synchronous).
      This module script is type="module" so it's always deferred — window.CMS
      is already defined when it runs.
    -->
    <script type="module" src="/admin/bundle.js"></script>
  </body>
</html>
