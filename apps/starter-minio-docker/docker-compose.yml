# One-command self-hosted LaikaCMS: `docker compose up`.
#
# Services:
#   minio          — S3-compatible object store, persists to ./data/minio.
#   minio-init     — runs once to create the `laikacms` bucket if missing.
#   laikacms       — the Hono backend using laikacms/storage-s3 over MinIO.
#
# After `docker compose up`:
#   http://localhost:3000          — LaikaCMS backend
#   http://localhost:3000/admin    — Decap CMS admin
#   http://localhost:9001          — MinIO console (login: minioadmin / minioadmin)

services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        (mc mb local/laikacms || echo 'bucket already exists') &&
        echo 'bucket ready'
      "

  laikacms:
    build: .
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: laikacms
    ports:
      - "3000:3000"
