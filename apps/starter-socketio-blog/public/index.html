<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 48rem; margin: 2rem auto; padding: 0 1rem; }
      a { color: #0070f3; text-decoration: none; cursor: pointer; }
      a:hover { text-decoration: underline; }
      nav { margin-bottom: 2rem; }
      nav a { margin-right: 1rem; }
      time { color: #666; font-size: 0.875rem; }
      #live-indicator { font-size: 0.75rem; color: #28a745; margin-left: 0.5rem; }
      #live-indicator.disconnected { color: #dc3545; }
      .post-list { list-style: none; padding: 0; }
      .post-list li { margin-bottom: 1.5rem; }
      .flash { animation: flash 1s ease-out; }
      @keyframes flash { 0% { background: #fffbcc; } 100% { background: transparent; } }
    </style>
  </head>
  <body>
    <nav>
      <a href="#" id="nav-home">Home</a>
      <a href="/admin/">Admin</a>
      <span id="live-indicator" class="disconnected">● offline</span>
    </nav>
    <div id="content"><p>Loading…</p></div>

    <!-- Socket.io client from the server's own bundle -->
    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
      /**
       * Real-time blog frontend.
       *
       * The server watches content/ with node:fs.watch and emits 'content:updated'
       * via Socket.io whenever a markdown file changes. On receiving the event,
       * the browser refetches the post list without a full page reload.
       */
      const contentEl = document.getElementById('content');
      const liveIndicator = document.getElementById('live-indicator');
      const navHome = document.getElementById('nav-home');

      // ── Socket.io ────────────────────────────────────────────────────────
      const socket = io();

      socket.on('connect', () => {
        liveIndicator.textContent = '● live';
        liveIndicator.className = '';
      });

      socket.on('disconnect', () => {
        liveIndicator.textContent = '● offline';
        liveIndicator.className = 'disconnected';
      });

      socket.on('content:updated', () => {
        // Only refresh if we're on the list page
        if (!slugFromHash()) {
          renderList({ flash: true });
        }
      });

      // ── Routing (hash-based) ─────────────────────────────────────────────
      function slugFromHash() {
        const h = location.hash.slice(1);
        return h.startsWith('post/') ? h.slice('post/'.length) : null;
      }

      async function render() {
        const slug = slugFromHash();
        slug ? await renderPost(slug) : await renderList({});
      }

      navHome.addEventListener('click', e => { e.preventDefault(); location.hash = ''; renderList({}); });
      window.addEventListener('hashchange', render);

      // ── List page ────────────────────────────────────────────────────────
      async function renderList({ flash } = {}) {
        try {
          const posts = await (await fetch('/posts')).json();
          if (posts.length === 0) {
            contentEl.innerHTML = '<h1>My Blog</h1><p>No posts yet. <a href="/admin/">Open the CMS</a> to write your first post.</p>';
            return;
          }
          const items = posts.map(p =>
            `<li><a href="#post/${p.slug}">${p.slug}</a>${p.updatedAt ? ` · <time>${new Date(p.updatedAt).toLocaleDateString()}</time>` : ''}</li>`
          ).join('');
          contentEl.innerHTML = `<h1>My Blog</h1><ul class="post-list">${items}</ul>`;
          if (flash) {
            contentEl.querySelector('ul').classList.add('flash');
          }
        } catch (err) {
          contentEl.innerHTML = `<p>Error: ${err.message}</p>`;
        }
      }

      // ── Post page ────────────────────────────────────────────────────────
      async function renderPost(slug) {
        try {
          const res = await fetch(`/posts/${encodeURIComponent(slug)}`);
          if (res.status === 404) {
            contentEl.innerHTML = '<h1>404 — Not Found</h1><p><a href="#">← Back</a></p>';
            return;
          }
          const post = await res.json();
          contentEl.innerHTML = `
            <article>
              <h1>${post.title ?? slug}</h1>
              ${post.date ? `<time>${new Date(post.date).toLocaleDateString()}</time>` : ''}
              ${post.description ? `<p><em>${post.description}</em></p>` : ''}
              <pre style="white-space:pre-wrap;font-family:inherit">${post.body ?? ''}</pre>
            </article>
            <p><a href="#">← Back</a></p>`;
        } catch (err) {
          contentEl.innerHTML = `<p>Error: ${err.message}</p>`;
        }
      }

      render();
    </script>
  </body>
</html>
