<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdonisJS Blog — LaikaCMS</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 48rem; margin: 2rem auto; padding: 0 1rem; }
    nav { margin-bottom: 2rem; display: flex; gap: 1rem; }
    a { color: #0070f3; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
    time { color: #666; font-size: 0.875rem; display: block; }
    pre { white-space: pre-wrap; font-family: inherit; }
    .back { margin-top: 2rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/" id="home-link">Home</a>
    <a href="/admin/">Admin</a>
  </nav>

  <main id="content">
    <p>Loading…</p>
  </main>

  <script type="module">
    const content = document.getElementById('content');
    const homeLink = document.getElementById('home-link');

    async function renderList() {
      content.innerHTML = '<p>Loading…</p>';
      history.pushState(null, '', '/');
      const posts = await fetch('/posts').then(r => r.json());
      if (!posts.length) {
        content.innerHTML = `<p>No posts yet. <a href="/admin/">Open the CMS</a> to write your first post.</p>`;
        return;
      }
      content.innerHTML = `
        <h1>My Blog</h1>
        <ul class="post-list">
          ${posts.map(p => `
            <li>
              <a href="/blog/${p.slug}" data-slug="${p.slug}">${p.slug}</a>
              ${p.updatedAt ? `<time>${new Date(p.updatedAt).toLocaleDateString()}</time>` : ''}
            </li>
          `).join('')}
        </ul>
      `;
      document.querySelectorAll('[data-slug]').forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          renderPost(link.dataset.slug);
        });
      });
    }

    async function renderPost(slug) {
      content.innerHTML = '<p>Loading…</p>';
      history.pushState(null, '', `/blog/${slug}`);
      const post = await fetch(`/posts/${slug}`).then(r => r.ok ? r.json() : null).catch(() => null);
      if (!post) {
        content.innerHTML = `<h1>Not Found</h1><p class="back"><a href="/" id="back">← Back</a></p>`;
        document.getElementById('back').addEventListener('click', e => { e.preventDefault(); renderList(); });
        return;
      }
      content.innerHTML = `
        <article>
          <h1>${post.title ?? post.slug}</h1>
          ${post.date ? `<time>${new Date(post.date).toLocaleDateString()}</time>` : ''}
          ${post.description ? `<p><em>${post.description}</em></p>` : ''}
          <pre>${post.body ?? ''}</pre>
          <p class="back"><a href="/" id="back">← Back</a></p>
        </article>
      `;
      document.getElementById('back').addEventListener('click', e => { e.preventDefault(); renderList(); });
    }

    homeLink.addEventListener('click', e => { e.preventDefault(); renderList(); });

    const m = location.pathname.match(/^\/blog\/(.+)$/);
    if (m) renderPost(m[1]); else renderList();
  </script>
</body>
</html>
